].message.content);\">\n<pre class=\"code\"><span class=\"kw\">import<\u002Fspan> OpenAI <span class=\"kw\">from<\u002Fspan> <span class=\"str\">\"openai\"<\u002Fspan>;\n\n<span class=\"kw\">const<\u002Fspan> client = <span class=\"kw\">new<\u002Fspan> <span class=\"fn\">OpenAI<\u002Fspan>({\n  baseURL: <span class=\"str\">\"https://api.burncloud.com/v1\"<\u002Fspan>,\n  apiKey: <span class=\"str\">\"your-key\"<\u002Fspan>,\n});\n\n<span class=\"kw\">const<\u002Fspan> response = <span class=\"kw\">await<\u002Fspan> client.chat.completions.<span class=\"fn\">create<\u002Fspan>({\n  model: <span class=\"str\">\"deepseek-v4-flash\"<\u002Fspan>,\n  messages: [{ role: <span class=\"str\">\"user\"<\u002Fspan>, content: <span class=\"str\">\"Hello\"<\u002Fspan> }],\n});\nconsole.<span class=\"fn\">log<\u002Fspan>(response.choices[<span class=\"str\">0<\u002Fspan>].message.content);<\u002Fpre>\n            <\u002Fdiv>\n            <div class=\"codepane\" id=\"pane-curl\" data-raw=\"curl https://api.burncloud.com/v1/chat/completions \\\n  -H &quot;Authorization: Bearer your-key&quot; \\\n  -H &quot;Content-Type: application/json&quot; \\\n  -d &quot;{\n    \\&quot;model\\&quot;: \\&quot;deepseek-v4-flash\\&quot;,\n    \\&quot;messages\\&quot;: [{\\&quot;role\\&quot;: \\&quot;user\\&quot;, \\&quot;content\\&quot;: \\&quot;Hello\\&quot;}]\n  }&quot;\">\n<pre class=\"code\">curl https://api.burncloud.com/v1/chat/completions \\\n  -H <span class=\"str\">\"Authorization: Bearer your-key\"<\u002Fspan> \\\n  -H <span class=\"str\">\"Content-Type: application/json\"<\u002Fspan> \\\n  -d <span class=\"str\">'{\n    \"model\": \"deepseek-v4-flash\",\n    \"messages\": [{\"role\": \"user\", \"content\": \"Hello\"}]\n  }'<\u002Fspan><\u002Fpre>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <p class=\"codecap\"><span class=\"ic\">✓<\u002Fspan> OpenAI SDK compatible &nbsp; <span class=\"ic\">✓<\u002Fspan> No code changes needed<\u002Fp>\n\n        <h2 id=\"
