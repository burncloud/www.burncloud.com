\", slug:\"#\", prov:\"DeepSeek\", input:0.435, output:0.87, ctx:1000, ctxLabel:\"1M\", type:\"chinese\", typeLabel:\"Chinese\", badge:{cls:\"code\",txt:\"Flagship\"} },\n    { name:\"DeepSeek V4 Flash\", slug:\"BurnCloud Model — DeepSeek V4 Flash.html\", prov:\"DeepSeek\", input:0.14, output:0.28, ctx:1000, ctxLabel:\"1M\", type:\"chinese\", typeLabel:\"Chinese\", badge:null },\n    { name:\"DeepSeek V3.2\", slug:\"BurnCloud Model — DeepSeek V3.html\", prov:\"DeepSeek\", input:0.14, output:0.28, ctx:128, ctxLabel:\"128K\", type:\"chinese\", typeLabel:\"Chinese\", badge:null },\n    { name:\"DeepSeek R1\", slug:\"#\", prov:\"DeepSeek\", input:0.55, output:2.19, ctx:128, ctxLabel:\"128K\", type:\"chinese\", typeLabel:\"Chinese\", badge:{cls:\"code\",txt:\"Reasoning\"} },\n    { name:\"Kimi K2.6\", slug:\"#\", prov:\"Moonshot\", input:0.50, output:2.00, ctx:1000, ctxLabel:\"1M\", type:\"chinese\", typeLabel:\"Chinese\", badge:null },\n    { name:\"Qwen 3.6 Plus\", slug:\"#\", prov:\"Alibaba\", input:0.78, output:3.90, ctx:256, ctxLabel:\"256K\", type:\"chinese\", typeLabel:\"Chinese\", badge:null },\n    { name:\"Qwen 3.5\", slug:\"#\", prov:\"Alibaba\", input:0.38, output:1.52, ctx:128, ctxLabel:\"128K\", type:\"chinese\", typeLabel:\"Chinese\", badge:null },\n    { name:\"GLM-5.1\", slug:\"#\", prov:\"Zhipu\", input:0.45, output:1.80, ctx:256, ctxLabel:\"256K\", type:\"chinese\", typeLabel:\"Chinese\", badge:null },\n    { name:\"Step 3.5 Flash\", slug:\"#\", prov:\"StepFun\", input:0.10, output:0.40, ctx:128, ctxLabel:\"128K\", type:\"chinese\", typeLabel:\"Chinese\", badge:{cls:\"cheap\",txt:\"Cheapest\"} },\n    { name:\"Doubao Pro\", slug:\"#\", prov:\"ByteDance\", input:0.42, output:1.68, ctx:128, ctxLabel:\"128K\", type:\"chinese\", typeLabel:\"Chinese\", badge:null },\n    { name:\"MiniMax Text\", slug:\"#\", prov:\"MiniMax\", input:0.32, output:1.28, ctx:256, ctxLabel:\"256K\", type:\"chinese\", typeLabel:\"Chinese\", badge:null }\n  ];\n\n  // 2 decimals normally; keep a 3rd decimal only when the price truly needs it (e.g. $0.435).\n  // Round to thousandths first to avoid floating-point artefacts (0.14*100 !== 14).\n  const fmt = (n) => { const r = Math.round(n * 1000); return \"$\" + (r % 10 === 0 ? (r / 1000).toFixed(2) : (r / 1000).toFixed(3)) + \"/1M\"; };\n\n  function cardHTML(m){\n    const badge = m.badge ? `<span class=\"badge ${m.badge.cls}\">${m.badge.txt}<\u002Fspan>` : \"\";\n    return `<a class=\"mcard\" href=\"${m.slug}\" data-type=\"${m.type}\" data-input=\"${m.input}\">\n      <span class=\"prov\">${m.prov}<\u002Fspan>\n      <span class=\"mname\">${m.name}<\u002Fspan>\n      ${badge}\n      <div class=\"specs\">\n        <div class=\"spec\"><span class=\"k\">Input<\u002Fspan><span class=\"v price\">${fmt(m.input)}<\u002Fspan><\u002Fdiv>\n        <div class=\"spec\"><span class=\"k\">Output<\u002Fspan><span class=\"v price\">${fmt(m.output)}<\u002Fspan><\u002Fdiv>\n        <div class=\"spec\"><span class=\"k\">Context<\u002Fspan><span class=\"v\">${m.ctxLabel}<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <span class=\"detail\">View Details <span class=\"ar\">&#8594;<\u002Fspan><\u002Fspan>\n    <\u002Fa>`;\n  }\n\n  const gridC = document.getElementById('grid-chinese');\n  const gridF = document.getElementById('grid-frontier');\n  gridC.innerHTML = MODELS.filter(m=>m.type==='chinese').map(cardHTML).join('');\n  gridF.innerHTML = MODELS.filter(m=>m.type==='frontier').map(cardHTML).join('');\n\n  // ---- filters ----\n  const filts = document.querySelectorAll('.filt');\n  const groupHeads = document.querySelectorAll('.group-head');\n  filts.forEach(f => f.addEventListener('click', () => {\n    filts.forEach(x=>x.classList.remove('active'));\n    f.classList.add('active');\n    const mode = f.dataset.filter;\n    // reset sort styling\n    document.querySelectorAll('.mcard').forEach(c => c.classList.remove('hidden'));\n\n    if(mode==='all'){\n      showGroup('chinese',true); showGroup('frontier',true);\n      reorderGrid(gridC,'chinese',false); reorderGrid(gridF,'frontier',false);\n    } else if(mode==='chinese'){\n      showGroup('chinese',true); showGroup('frontier',false);\n    } else if(mode==='frontier'){\n      showGroup('chinese',false); showGroup('frontier',true);\n    } else if(mode==='price'){\n      // collapse into chinese grid sorted by input price, hide frontier group, retitle\n      showGroup('chinese',true); showGroup('frontier',false);\n      const sorted = [...MODELS].sort((a,b)=>a.input-b.input);\n      gridC.innerHTML = sorted.map(cardHTML).join('');\n      document.querySelector('[data-group=\"chinese\"] h2').textContent = 'All Models — Cheapest First';\n      document.querySelector('[data-group=\"chinese\"] .gcount').textContent = sorted.length + ' models';\n      return;\n    }\n    // restore titles + content when leaving price mode\n    document.querySelector('[data-group=\"chinese\"] h2').textContent = 'Chinese Models';\n    document.querySelector('[data-group=\"chinese\"] .gcount').textContent = 'Open-weight, lowest cost';\n    gridC.innerHTML = MODELS.filter(m=>m.type==='chinese').map(cardHTML).join('');\n    gridF.innerHTML = MODELS.filter(m=>m.type==='frontier').map(cardHTML).join('');\n  }));\n\n  function showGroup(group, show){\n    document.querySelectorAll(`[data-group=\"${group}\"]`).forEach(el=>el.classList.toggle('hidden',!show));\n    const grid = group==='chinese'?gridC:gridF;\n    grid.classList.toggle('hidden',!show);\n  }\n  function reorderGrid(){ /* placeholder for symmetry */ }\n\n  // ---- comparison table ----\n  let sortState = { key:'input', dir:1 };\n  function renderTable(){\n    const rows = [...MODELS].sort((a,b)=>{\n      let av=a[sortState.key], bv=b[sortState.key];\n      if(typeof av==='string'){ return sortState.dir*av.localeCompare(bv); }\n      return sortState.dir*(av-bv);\n    });\n    document.getElementById('cmpBody').innerHTML = rows.map(m=>`\n      <tr>\n        <td class=\"model\">${m.name}<\u002Ftd>\n        <td class=\"prov\">${m.prov}<\u002Ftd>\n        <td class=\"num\">${fmt(m.input)}<\u002Ftd>\n        <td class=\"num\">${fmt(m.output)}<\u002Ftd>\n        <td class=\"num\">${m.ctxLabel}<\u002Ftd>\n        <td><span class=\"type-tag\">${m.typeLabel}<\u002Fspan><\u002Ftd>\n        <td><a class=\"dlink\" href=\"${m.slug}\">View &#8594;<\u002Fa><\u002Ftd>\n      <\u002Ftr>`).join('');\n    document.querySelectorAll('th.sortable').forEach(th=>{\n      th.classList.toggle('sorted', th.dataset.key===sortState.key);\n    });\n  }\n  document.querySelectorAll('th.sortable').forEach(th=>{\n    th.addEventListener('click',()=>{\n      const key=th.dataset.key;\n      if(sortState.key===key){ sortState.dir*=-1; } else { sortState.key=key; sortState.dir=1; }\n      renderTable();\n    });\n  });\n  renderTable();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
